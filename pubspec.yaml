name: duty_track
description: Duty Track - Human Resources Management System for Taiz Central Correctional Facility.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # =========================
  # UI
  # =========================
  cupertino_icons: ^1.0.8
  flex_color_scheme: ^8.3.0
  google_fonts: ^6.3.0
  gap: ^3.0.1

  # =========================
  # State Management
  # =========================
  flutter_riverpod: ^2.6.1

  # =========================
  # Navigation
  # =========================
  go_router: ^16.0.0

  # =========================
  # Firebase
  # =========================
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0
  firebase_storage: ^13.0.0
  firebase_crashlytics: ^5.0.0

  # =========================
  # Models
  # =========================
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  equatable: ^2.0.7
  collection: ^1.19.1

  # =========================
  # Utilities
  # =========================
  intl: ^0.20.2
  uuid: ^4.5.1
  logger: ^2.6.1

  # =========================
  # Local Storage
  # =========================
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4

  # =========================
  # Connectivity
  # =========================
  connectivity_plus: ^6.1.5
  internet_connection_checker_plus: ^2.7.2

  # =========================
  # Files
  # =========================
  path_provider: ^2.1.5
  file_picker: ^10.2.0
  open_filex: ^4.7.0
  share_plus: ^11.0.0

  # =========================
  # Export
  # =========================
  pdf: ^3.11.3
  printing: ^5.14.2
  excel: ^4.0.6

  # =========================
  # Calendar & Charts
  # =========================
  table_calendar: ^3.2.0
  fl_chart: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  build_runner: ^2.5.4
  freezed: ^3.2.0
  json_serializable: ^6.10.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/translations/

  fonts: []